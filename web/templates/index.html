<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess IA</title>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #c9a84c;
    }

    /* ===== Layout ===== */
    .game-container {
      display: flex;
      gap: 28px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ===== Board wrapper ===== */
    .board-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      user-select: none;
    }

    .board-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .rank-label, .file-label {
      width: 20px;
      text-align: center;
      font-size: 0.75rem;
      color: #888;
      font-weight: 600;
    }

    .file-labels {
      display: flex;
      gap: 4px;
      padding-left: 24px;
    }

    .file-label { width: 72px; }

    /* ===== Board ===== */
    #board {
      display: grid;
      grid-template-columns: repeat(8, 72px);
      grid-template-rows: repeat(8, 72px);
      border: 3px solid #c9a84c;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    .square {
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: filter 0.1s;
    }

    .square.light { background: #f0d9b5; }
    .square.dark  { background: #b58863; }
    .square:hover { filter: brightness(1.1); }

    .square.selected        { background: #7fc97f !important; }
    .square.last-from       { background: rgba(255, 215, 0, 0.5) !important; }
    .square.last-to         { background: rgba(255, 215, 0, 0.7) !important; }
    .square.in-check        { background: rgba(220, 50, 50, 0.75) !important; }

    .square.legal-move::after {
      content: '';
      position: absolute;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.18);
      pointer-events: none;
    }

    .square.legal-capture::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 0;
      background: transparent;
      border: 6px solid rgba(0, 0, 0, 0.20);
      pointer-events: none;
    }

    /* ===== Pieces ===== */
    .piece {
      font-size: 52px;
      line-height: 1;
      pointer-events: none;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
      transition: transform 0.1s;
    }

    .square.selected .piece { transform: scale(1.1); }

    /* ===== Sidebar ===== */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 240px;
      max-width: 280px;
    }

    .card {
      background: #16213e;
      border: 1px solid #2a3a5e;
      border-radius: 10px;
      padding: 16px;
    }

    .card h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #888;
      margin-bottom: 10px;
    }

    /* Status */
    #status-text {
      font-size: 1.05rem;
      font-weight: 500;
      color: #e0e0e0;
      line-height: 1.5;
    }

    #status-text.check    { color: #ff6b6b; }
    #status-text.gameover { color: #c9a84c; font-size: 1.15rem; font-weight: 700; }

    .turn-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }

    .turn-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid #888;
    }

    .turn-dot.white-turn { background: #f5f5f5; }
    .turn-dot.black-turn { background: #222; }

    /* Move history */
    #move-history {
      max-height: 130px;
      overflow-y: auto;
      font-size: 0.82rem;
      color: #aaa;
      line-height: 1.8;
      scrollbar-width: thin;
      scrollbar-color: #2a3a5e transparent;
    }

    #move-history span.move-pair { margin-right: 6px; }
    #move-history span.move-num  { color: #666; }
    #move-history span.move-uci  { color: #c9a84c; cursor: default; }
    #move-history span.move-uci:hover { color: #e0c070; }

    /* Controls */
    .controls { display: flex; flex-direction: column; gap: 8px; }

    .btn {
      padding: 9px 14px;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: all 0.15s;
    }

    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary   { background: #c9a84c; color: #1a1a2e; }
    .btn-primary:hover:not(:disabled) { background: #e0c070; transform: translateY(-1px); }

    .btn-secondary { background: #2a3a5e; color: #e0e0e0; }
    .btn-secondary:hover:not(:disabled) { background: #3a4e7a; }

    .btn-danger    { background: #7a2a2e; color: #e0e0e0; }
    .btn-danger:hover:not(:disabled) { background: #a03040; }

    /* Color selector */
    .color-select { display: flex; gap: 8px; }

    .color-btn {
      flex: 1;
      padding: 8px;
      border: 2px solid #2a3a5e;
      border-radius: 6px;
      background: #16213e;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 0.85rem;
      text-align: center;
      transition: all 0.15s;
    }

    .color-btn.active { border-color: #c9a84c; color: #c9a84c; }
    .color-btn:hover  { border-color: #c9a84c80; }

    /* Info row */
    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: #666;
    }

    /* ===== Agent selection ===== */
    .agent-grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .agent-btn {
      padding: 8px 12px;
      border: 2px solid #2a3a5e;
      border-radius: 7px;
      background: #1a1a2e;
      color: #aaa;
      cursor: pointer;
      font-size: 0.83rem;
      font-weight: 500;
      text-align: left;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .agent-btn:hover    { border-color: #c9a84c80; color: #e0e0e0; }
    .agent-btn.selected { border-color: #c9a84c; color: #c9a84c; background: #1e2a40; }

    .agent-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #2a3a5e;
      flex-shrink: 0;
    }

    .agent-btn.selected .agent-dot { background: #c9a84c; }

    /* ===== Training ===== */
    .train-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    .train-row label {
      font-size: 0.78rem;
      color: #888;
      white-space: nowrap;
    }

    .train-row input[type=number] {
      width: 80px;
      padding: 5px 8px;
      background: #1a1a2e;
      border: 1px solid #2a3a5e;
      border-radius: 5px;
      color: #e0e0e0;
      font-size: 0.83rem;
    }

    .progress-bar-wrap {
      height: 6px;
      background: #2a3a5e;
      border-radius: 3px;
      margin: 8px 0 6px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: #c9a84c;
      border-radius: 3px;
      transition: width 0.3s ease;
      width: 0%;
    }

    #train-status {
      font-size: 0.78rem;
      color: #888;
      min-height: 18px;
    }

    /* ===== Agent info ===== */
    .agent-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 4px;
    }

    .stat-box {
      background: #1a1a2e;
      border: 1px solid #2a3a5e;
      border-radius: 6px;
      padding: 6px 8px;
    }

    .stat-label {
      font-size: 0.68rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-value {
      font-size: 0.95rem;
      font-weight: 600;
      color: #c9a84c;
      margin-top: 2px;
    }

    /* ===== Toast ===== */
    #toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 200;
    }

    .toast {
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 500;
      max-width: 320px;
      animation: toast-in 0.2s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    .toast.error   { background: #7a2a2e; color: #ffcdd2; border-left: 4px solid #ff5252; }
    .toast.success { background: #1e4a2a; color: #c8e6c9; border-left: 4px solid #66bb6a; }
    .toast.info    { background: #1a3a5e; color: #bbdefb; border-left: 4px solid #42a5f5; }

    @keyframes toast-in {
      from { opacity: 0; transform: translateX(40px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ===== Promotion Modal ===== */
    #promo-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #promo-modal.visible { display: flex; }

    .promo-box {
      background: #16213e;
      border: 2px solid #c9a84c;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
    }

    .promo-box h2 {
      color: #c9a84c;
      margin-bottom: 16px;
      font-size: 1.1rem;
      letter-spacing: 2px;
    }

    .promo-choices { display: flex; gap: 12px; }

    .promo-choice {
      width: 72px;
      height: 72px;
      font-size: 52px;
      line-height: 72px;
      cursor: pointer;
      border-radius: 8px;
      background: #1a1a2e;
      border: 2px solid #2a3a5e;
      text-align: center;
      transition: all 0.15s;
    }

    .promo-choice:hover {
      border-color: #c9a84c;
      background: #2a3a5e;
      transform: scale(1.08);
    }
  </style>
</head>
<body>

<h1>Chess IA</h1>

<div class="game-container">

  <!-- Board -->
  <div class="board-wrapper">
    <div id="board"></div>
    <div class="file-labels" id="file-labels"></div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">

    <!-- Status -->
    <div class="card">
      <h3>Partie</h3>
      <div id="status-text">Chargement…</div>
      <div class="turn-indicator">
        <div class="turn-dot" id="turn-dot"></div>
        <span id="turn-label" style="font-size:0.85rem;color:#aaa"></span>
      </div>
      <div class="info-row" style="margin-top:8px">
        <span id="move-counter"></span>
        <span id="halfmove-clock"></span>
      </div>
    </div>

    <!-- Agent selection -->
    <div class="card">
      <h3>Agent IA</h3>
      <div class="agent-grid" id="agent-grid">
        <!-- filled by JS -->
      </div>
    </div>

    <!-- Agent info -->
    <div class="card" id="agent-info-card" style="display:none">
      <h3>Stats agent</h3>
      <div class="agent-stats">
        <div class="stat-box">
          <div class="stat-label">Epsilon</div>
          <div class="stat-value" id="stat-epsilon">—</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Steps</div>
          <div class="stat-value" id="stat-steps">—</div>
        </div>
        <div class="stat-box" style="grid-column:1/-1">
          <div class="stat-label">Q-table (états)</div>
          <div class="stat-value" id="stat-qtable">—</div>
        </div>
      </div>
    </div>

    <!-- Training -->
    <div class="card" id="train-card" style="display:none">
      <h3>Entraînement</h3>
      <div class="train-row">
        <label for="train-episodes">Épisodes :</label>
        <input type="number" id="train-episodes" value="200" min="1" max="100000">
      </div>
      <button class="btn btn-secondary" id="btn-train" onclick="startTraining()">Entraîner</button>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div id="train-status">Prêt</div>
    </div>

    <!-- Move history -->
    <div class="card">
      <h3>Historique</h3>
      <div id="move-history"></div>
    </div>

    <!-- Controls -->
    <div class="card">
      <h3>Nouvelle partie</h3>
      <div class="color-select" style="margin-bottom:10px">
        <div class="color-btn active" id="btn-white" onclick="selectColor('white')">♔ Blancs</div>
        <div class="color-btn"        id="btn-black" onclick="selectColor('black')">♚ Noirs</div>
      </div>
      <div class="controls">
        <button class="btn btn-primary" onclick="newGame()">Nouvelle partie</button>
      </div>
    </div>

  </div>
</div>

<!-- Promotion modal -->
<div id="promo-modal">
  <div class="promo-box">
    <h2>PROMOTION</h2>
    <div class="promo-choices" id="promo-choices"></div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
// ===================================================================
// Toast notifications
// ===================================================================
function showToast(msg, type = 'info', duration = 3500) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), duration);
}

// ===================================================================
// API wrapper with error handling
// ===================================================================
async function apiFetch(path, options = {}) {
  try {
    const res = await fetch(path, options);
    const data = await res.json();
    if (!res.ok) {
      const msg = data.error || `Erreur ${res.status}`;
      showToast(msg, 'error');
      return null;
    }
    return data;
  } catch (e) {
    showToast(`Connexion impossible : ${e.message}`, 'error');
    return null;
  }
}

// ===================================================================
// Pièces Unicode
// ===================================================================
const PIECES = {
  '6': '♔', '5': '♕', '4': '♖', '3': '♗', '2': '♘', '1': '♙',
  '-6': '♚', '-5': '♛', '-4': '♜', '-3': '♝', '-2': '♞', '-1': '♟',
};

const AGENT_DEFS = [
  { id: 'random',         label: 'Aléatoire',     icon: '🎲' },
  { id: 'sarsa',          label: 'SARSA',          icon: '📈' },
  { id: 'q_learning',     label: 'Q-Learning',     icon: '📊' },
  { id: 'expected_sarsa', label: 'Expected SARSA', icon: '📉' },
  { id: 'monte_carlo',    label: 'Monte Carlo',    icon: '🎰' },
];

// ===================================================================
// État local
// ===================================================================
let state        = null;
let selectedSq   = null;
let legalTargets = [];
let pendingPromo = null;
let chosenColor  = 'white';
let moveLog      = [];
let currentAgent = 'random';
let trainingPoll = null;

// ===================================================================
// Initialisation
// ===================================================================
function init() {
  buildBoard();
  buildFileLabels();
  buildAgentGrid();
  fetchState();
}

function buildFileLabels() {
  const el = document.getElementById('file-labels');
  if (!el) return;
  const spacer = document.createElement('div');
  spacer.style.width = '20px';
  el.appendChild(spacer);
  ['a','b','c','d','e','f','g','h'].forEach(f => {
    const div = document.createElement('div');
    div.className = 'file-label';
    div.textContent = f;
    el.appendChild(div);
  });
}

function buildBoard() {
  const boardEl = document.getElementById('board');
  if (!boardEl) return;
  boardEl.innerHTML = '';
  for (let row = 7; row >= 0; row--) {
    for (let col = 0; col < 8; col++) {
      const sq = row * 8 + col;
      const div = document.createElement('div');
      div.className = 'square ' + ((row + col) % 2 === 0 ? 'dark' : 'light');
      div.dataset.sq = sq;
      div.addEventListener('click', () => onSquareClick(sq));
      boardEl.appendChild(div);
    }
  }
}

function buildAgentGrid() {
  const grid = document.getElementById('agent-grid');
  if (!grid) return;
  grid.innerHTML = '';
  AGENT_DEFS.forEach(agent => {
    const btn = document.createElement('button');
    btn.className = 'agent-btn' + (agent.id === currentAgent ? ' selected' : '');
    btn.id = `agent-btn-${agent.id}`;
    btn.innerHTML = `<span class="agent-dot"></span>${agent.icon} ${agent.label}`;
    btn.onclick = () => selectAgent(agent.id);
    grid.appendChild(btn);
  });
}

// ===================================================================
// Agent selection
// ===================================================================
async function selectAgent(id) {
  const data = await apiFetch('/api/select_agent', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ agent: id }),
  });
  if (!data) return;

  currentAgent = id;
  document.querySelectorAll('.agent-btn').forEach(b => b.classList.remove('selected'));
  const btn = document.getElementById(`agent-btn-${id}`);
  if (btn) btn.classList.add('selected');

  const isRandom = id === 'random';
  const infoCard  = document.getElementById('agent-info-card');
  const trainCard = document.getElementById('train-card');
  if (infoCard)  infoCard.style.display  = isRandom ? 'none' : '';
  if (trainCard) trainCard.style.display = isRandom ? 'none' : '';

  if (!isRandom) {
    updateAgentStats(null); // reset display
    showToast(`Agent "${id}" sélectionné`, 'success', 2000);
  }

  // Refresh full state which includes agent info
  const s = await apiFetch('/api/state');
  if (s) { state = s; updateAgentStats(s.agent); }
}

function updateAgentStats(agentInfo) {
  const epEl = document.getElementById('stat-epsilon');
  const stEl = document.getElementById('stat-steps');
  const qtEl = document.getElementById('stat-qtable');
  if (!epEl || !stEl || !qtEl) return;

  if (!agentInfo) {
    epEl.textContent = '—';
    stEl.textContent = '—';
    qtEl.textContent = '—';
    return;
  }
  epEl.textContent = agentInfo.epsilon !== undefined ? agentInfo.epsilon.toFixed(3) : '—';
  stEl.textContent = agentInfo.training_steps !== undefined
    ? agentInfo.training_steps.toLocaleString() : '—';
  qtEl.textContent = agentInfo.q_table_size !== undefined
    ? agentInfo.q_table_size.toLocaleString() : '—';
}

// ===================================================================
// Training
// ===================================================================
async function startTraining() {
  const episodesEl = document.getElementById('train-episodes');
  const n = parseInt(episodesEl ? episodesEl.value : 200) || 200;

  const data = await apiFetch('/api/train', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ episodes: n }),
  });
  if (!data) return;

  showToast(`Entraînement lancé (${n} épisodes)`, 'info', 2500);
  const btn = document.getElementById('btn-train');
  if (btn) btn.disabled = true;

  // Poll training status
  if (trainingPoll) clearInterval(trainingPoll);
  trainingPoll = setInterval(pollTrainingStatus, 600);
}

async function pollTrainingStatus() {
  const data = await apiFetch('/api/training_status');
  if (!data) return;

  const fill   = document.getElementById('progress-fill');
  const status = document.getElementById('train-status');
  const btn    = document.getElementById('btn-train');

  if (fill)   fill.style.width = `${data.progress || 0}%`;
  if (status) {
    if (data.running) {
      status.textContent = `Épisode ${data.episodes_done} / ${data.total}`;
    } else if (data.episodes_done > 0) {
      status.textContent = `Terminé — ${data.episodes_done} épisodes`;
    }
  }

  updateAgentStats(data);

  if (!data.running) {
    if (trainingPoll) { clearInterval(trainingPoll); trainingPoll = null; }
    if (btn) btn.disabled = false;
    if (data.episodes_done > 0) showToast('Entraînement terminé !', 'success');
  }
}

// ===================================================================
// Fetch & Render
// ===================================================================
async function fetchState() {
  const s = await apiFetch('/api/state');
  if (!s) return;
  state = s;
  render(state);
  if (state.agent) updateAgentStats(state.agent);
}

function render(s) {
  if (!s) return;
  clearHighlights();

  // Place pieces
  for (let sq = 0; sq < 64; sq++) {
    const el = getSquareEl(sq);
    if (!el) continue;
    const p = s.pieces[String(sq)];
    el.innerHTML = p ? `<span class="piece">${PIECES[p]}</span>` : '';
  }

  // Last move highlight
  if (s.last_move) {
    const files = 'abcdefgh';
    const from_col = files.indexOf(s.last_move[0]);
    const from_row = parseInt(s.last_move[1]) - 1;
    const to_col   = files.indexOf(s.last_move[2]);
    const to_row   = parseInt(s.last_move[3]) - 1;
    const fromEl = getSquareEl(from_row * 8 + from_col);
    const toEl   = getSquareEl(to_row   * 8 + to_col);
    if (fromEl) fromEl.classList.add('last-from');
    if (toEl)   toEl.classList.add('last-to');
  }

  // Check highlight
  if (s.in_check) {
    const kingPiece = s.turn === 'white' ? 6 : -6;
    for (const [sqStr, p] of Object.entries(s.pieces)) {
      if (p === kingPiece) {
        const el = getSquareEl(parseInt(sqStr));
        if (el) el.classList.add('in-check');
        break;
      }
    }
  }

  // Selected square & legal move targets
  if (selectedSq !== null) {
    const selEl = getSquareEl(selectedSq);
    if (selEl) selEl.classList.add('selected');
    legalTargets.forEach(uci => {
      const to_col = 'abcdefgh'.indexOf(uci[2]);
      const to_row = parseInt(uci[3]) - 1;
      const sq = to_row * 8 + to_col;
      const hasPiece = !!s.pieces[String(sq)];
      const el = getSquareEl(sq);
      if (el) el.classList.add(hasPiece ? 'legal-capture' : 'legal-move');
    });
  }

  updateStatus(s);
  updateHistory(s);
  if (s.agent) updateAgentStats(s.agent);
}

function clearHighlights() {
  document.querySelectorAll('.square').forEach(el => {
    el.classList.remove('selected','last-from','last-to','in-check','legal-move','legal-capture');
  });
}

function getSquareEl(sq) {
  return document.querySelector(`.square[data-sq="${sq}"]`);
}

// ===================================================================
// Status
// ===================================================================
function updateStatus(s) {
  const txt = document.getElementById('status-text');
  const dot = document.getElementById('turn-dot');
  const lbl = document.getElementById('turn-label');
  if (!txt || !dot || !lbl) return;

  if (s.result) {
    txt.className = 'gameover';
    if (s.result === 'white')      txt.textContent = '♔ Les Blancs gagnent !';
    else if (s.result === 'black') txt.textContent = '♚ Les Noirs gagnent !';
    else                           txt.textContent = '½–½  Nulle';
    dot.className = 'turn-dot';
    lbl.textContent = 'Partie terminée';
  } else if (s.in_check) {
    txt.className = 'check';
    txt.textContent = '⚠ Échec !';
    dot.className = 'turn-dot ' + (s.turn === 'white' ? 'white-turn' : 'black-turn');
    lbl.textContent = s.turn === 'white' ? 'Blancs jouent' : 'Noirs jouent';
  } else {
    txt.className = '';
    const isPlayerTurn = s.turn === s.player_color;
    txt.textContent = isPlayerTurn ? 'À votre tour' : 'IA réfléchit…';
    dot.className = 'turn-dot ' + (s.turn === 'white' ? 'white-turn' : 'black-turn');
    lbl.textContent = s.turn === 'white' ? 'Blancs jouent' : 'Noirs jouent';
  }

  const mc = document.getElementById('move-counter');
  const hc = document.getElementById('halfmove-clock');
  if (mc) mc.textContent = `Coup ${s.fullmove}`;
  if (hc) hc.textContent = `50: ${s.halfmove_clock}/100`;
}

// ===================================================================
// Move history
// ===================================================================
function updateHistory(s) {
  const el = document.getElementById('move-history');
  if (!el) return;

  if (s.last_move && (moveLog.length === 0 || moveLog[moveLog.length-1] !== s.last_move)) {
    moveLog.push(s.last_move);
  }

  let html = '';
  for (let i = 0; i < moveLog.length; i += 2) {
    const num   = Math.floor(i / 2) + 1;
    const white = moveLog[i]   || '';
    const black = moveLog[i+1] || '';
    html += `<span class="move-pair">
      <span class="move-num">${num}.</span>
      <span class="move-uci">${white}</span>
      ${black ? `<span class="move-uci"> ${black}</span>` : ''}
    </span>`;
  }
  el.innerHTML = html || '<span style="color:#555">Aucun coup joué</span>';
  el.scrollTop = el.scrollHeight;
}

// ===================================================================
// Click handling
// ===================================================================
async function onSquareClick(sq) {
  if (!state || state.result) return;

  const isPlayerTurn = state.turn === state.player_color;
  if (!isPlayerTurn) return;

  const piece = state.pieces[String(sq)];
  const isOwnPiece = piece && (
    (state.turn === 'white' && piece > 0) ||
    (state.turn === 'black' && piece < 0)
  );

  if (selectedSq !== null) {
    const isLegal = legalTargets.some(uci => {
      const tc = 'abcdefgh'.indexOf(uci[2]);
      const tr = parseInt(uci[3]) - 1;
      return tr * 8 + tc === sq;
    });

    if (isLegal) {
      await tryMove(selectedSq, sq);
      return;
    }

    if (isOwnPiece) {
      await selectSquare(sq);
      return;
    }

    selectedSq = null;
    legalTargets = [];
    render(state);
    return;
  }

  if (isOwnPiece) {
    await selectSquare(sq);
  }
}

async function selectSquare(sq) {
  selectedSq = sq;
  const data = await apiFetch(`/api/legal_moves/${sq}`);
  legalTargets = data ? data.moves : [];
  render(state);
}

async function tryMove(fromSq, toSq) {
  const piece = state.pieces[String(fromSq)];
  const toRow = Math.floor(toSq / 8);
  const isPawnPromo = (
    Math.abs(piece) === 1 &&
    ((piece > 0 && toRow === 7) || (piece < 0 && toRow === 0))
  );

  if (isPawnPromo) {
    pendingPromo = { fromSq, toSq };
    showPromoModal(piece > 0 ? 'white' : 'black');
    return;
  }

  await sendMove(fromSq, toSq, '');
}

async function sendMove(fromSq, toSq, promoChar) {
  selectedSq = null;
  legalTargets = [];

  const files = 'abcdefgh';
  const uci = files[fromSq % 8] + (Math.floor(fromSq / 8) + 1)
            + files[toSq   % 8] + (Math.floor(toSq   / 8) + 1)
            + promoChar;

  const data = await apiFetch('/api/move', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ uci }),
  });

  if (data) {
    state = data;
    render(state);
  } else {
    render(state);
  }
}

// ===================================================================
// Promotion Modal
// ===================================================================
function showPromoModal(color) {
  const modal   = document.getElementById('promo-modal');
  const choices = document.getElementById('promo-choices');
  if (!modal || !choices) return;

  const promos = color === 'white'
    ? [['♕','q'],['♖','r'],['♗','b'],['♘','n']]
    : [['♛','q'],['♜','r'],['♝','b'],['♞','n']];

  choices.innerHTML = '';
  promos.forEach(([sym, ch]) => {
    const div = document.createElement('div');
    div.className = 'promo-choice';
    div.textContent = sym;
    div.onclick = () => {
      modal.classList.remove('visible');
      if (pendingPromo) {
        sendMove(pendingPromo.fromSq, pendingPromo.toSq, ch);
        pendingPromo = null;
      }
    };
    choices.appendChild(div);
  });

  modal.classList.add('visible');
}

// ===================================================================
// New Game
// ===================================================================
function selectColor(color) {
  chosenColor = color;
  const bw = document.getElementById('btn-white');
  const bb = document.getElementById('btn-black');
  if (bw) bw.classList.toggle('active', color === 'white');
  if (bb) bb.classList.toggle('active', color === 'black');
}

async function newGame() {
  selectedSq = null;
  legalTargets = [];
  pendingPromo = null;
  moveLog = [];

  const data = await apiFetch('/api/reset', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ color: chosenColor }),
  });

  if (data) {
    state = data;
    render(state);
  }
}

// ===================================================================
// Start
// ===================================================================
init();
</script>

</html>
